apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mohammed123docker/spotify-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: DB_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: PORT
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: FRONTEND_URL
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: DB_USER
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: JWT_EXPIRES_IN
            - name: JWT_REFRESH_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: JWT_REFRESH_EXPIRES_IN
            - name: FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: spotify-config
                  key: FROM_EMAIL
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: JWT_REFRESH_SECRET
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: SPOTIFY_CLIENT_ID
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: SPOTIFY_CLIENT_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spotify-secret
                  key: RESEND_API_KEY
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5